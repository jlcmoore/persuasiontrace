# pytest.ini
# This file is used to set configuration options for `pytest`
[pytest]
asyncio_mode=auto
asyncio_default_fixture_loop_scope=function
filterwarnings =
    ignore:Support for class-based `config` is deprecated.*:pydantic.warnings.PydanticDeprecatedSince20
    ignore:open_text is deprecated.*:DeprecationWarning
    ignore:.*Importing 'parser\.split_arg_string' is deprecated.*:DeprecationWarning
